name: Validate Site

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'bin/site-validate.sh'
      - 'bin/install-hugo.sh'
  pull_request:
    branches: [main]
    paths:
      - 'site/**'
      - 'bin/site-validate.sh'
      - 'bin/install-hugo.sh'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: ./bin/install-hugo.sh
      - run: ./bin/site-validate.sh
