name: Validate Site

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'bin/site-validate.sh'
  pull_request:
    branches: [main]
    paths:
      - 'site/**'
      - 'bin/site-validate.sh'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: latest
          extended: true
      - run: ./bin/site-validate.sh
