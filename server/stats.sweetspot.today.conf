<VirtualHost *:443>
    ServerName stats.sweetspot.today
    DocumentRoot /var/www/stats.sweetspot.today

    # TLS — Cloudflare Origin CA certificate (Cloudflare handles public TLS)
    SSLEngine on
    SSLCertificateFile /etc/ssl/certs/sweetspot.today.pem
    SSLCertificateKeyFile /etc/ssl/private/sweetspot.today.key

    # Rewrite /report to stats.php
    RewriteEngine On
    RewriteRule ^/report$ /stats.php [L]

    <Directory /var/www/stats.sweetspot.today>
        AllowOverride FileInfo AuthConfig
        Require all granted

        # Only allow POST to stats.php (GET etc. are rejected by the script,
        # but no need to even invoke PHP for other paths)
        <Files "stats.php">
            Require all granted
        </Files>
    </Directory>

    # Deny access to everything except /report
    <LocationMatch "^/(?!report$)">
        Require all denied
    </LocationMatch>

    # Trust Cloudflare's CF-Connecting-IP for rate limiting
    RemoteIPHeader CF-Connecting-IP

    # Logging
    ErrorLog ${APACHE_LOG_DIR}/stats.sweetspot.today/error.log
    CustomLog ${APACHE_LOG_DIR}/stats.sweetspot.today/access.log combined
</VirtualHost>

# Redirect HTTP to HTTPS (Cloudflare normally handles this,
# but good to have in case of direct access)
<VirtualHost *:80>
    ServerName stats.sweetspot.today
    RewriteEngine On
    RewriteRule ^(.*)$ https://%{HTTP_HOST}$1 [R=301,L]
</VirtualHost>
