<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{ if .IsHome }}SweetSpot &mdash; {{ i18n "hero_title" }}{{ else }}{{ .Title }} &mdash; SweetSpot{{ end }}</title>
<meta name="description" content="{{ if .Params.description }}{{ .Params.description }}{{ else }}{{ i18n "hero_title" }}{{ end }}">
<link rel="canonical" href="{{ .Permalink }}">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">

<!-- Open Graph -->
<meta property="og:title" content="{{ if .IsHome }}SweetSpot{{ else }}{{ .Title }}{{ end }}">
<meta property="og:description" content="{{ if .Params.description }}{{ .Params.description }}{{ else }}{{ i18n "hero_title" }}{{ end }}">
<meta property="og:type" content="{{ if .IsHome }}website{{ else }}article{{ end }}">
<meta property="og:url" content="{{ .Permalink }}">
<meta property="og:image" content="{{ "images/icon.svg" | absURL }}">
<meta property="og:site_name" content="SweetSpot">
<meta property="og:locale" content="{{ .Lang }}">

<!-- Twitter Card -->
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="{{ if .IsHome }}SweetSpot{{ else }}{{ .Title }}{{ end }}">
<meta name="twitter:description" content="{{ if .Params.description }}{{ .Params.description }}{{ else }}{{ i18n "hero_title" }}{{ end }}">

<!-- Alternate languages -->
{{ range .Translations }}
<link rel="alternate" hreflang="{{ .Lang }}" href="{{ .Permalink }}">
{{ end }}
<link rel="alternate" hreflang="{{ .Lang }}" href="{{ .Permalink }}">

<link rel="stylesheet" href="/css/style.css">

<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-N2XPVVWG45"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-N2XPVVWG45');
</script>
