<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background circle (halo) -->
  <circle cx="16" cy="16" r="15.25" fill="#F5F7FA" stroke="#A0A8B4" stroke-width="0.75"/>
  <!-- Clock face -->
  <circle cx="16" cy="16" r="11" fill="#4a90d9" stroke="#357abd" stroke-width="1.2"/>
  <!-- Hour ticks -->
  <line x1="16" y1="6.2" x2="16" y2="8.1" stroke="#fff" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="25.8" y1="16" x2="23.9" y2="16" stroke="#fff" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="16" y1="25.8" x2="16" y2="23.9" stroke="#fff" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="6.2" y1="16" x2="8.1" y2="16" stroke="#fff" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Lightning bolt -->
  <polygon points="17.3,9.7 12.9,17.3 15.4,17.3 14.1,22.3 19.1,14.7 16.6,14.7" fill="#f1c40f" stroke="#e67e22" stroke-width="0.4" stroke-linejoin="round"/>
